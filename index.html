<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大伦车机口令工具——抖音@大伦哥的CDM</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 进入页弹窗提醒 -->
    <div id="usagePopup" class="popup-overlay">
        <div class="popup-content">
            <h3>免责说明</h3>
            <div class="popup-message">
                <p><strong>⚠️警示：</strong>刷机有风险，请严格按照教程操作，不要修改车机其他内容，否则后果自负。</p>
                <p><strong>重要说明：</strong>本内容仅在车机原系统上加装第三方管理工具，<strong>不对原系统修改，不影响终身质保</strong>；如需恢复，请执行恢复出厂设置操作。</p>
                <p><strong>适用范围：</strong>捷途旅行者、山海T2等车型，其他车型请自测。</p>
                <p><strong>特别提醒：</strong>每个车型的口令可能有多种算法，如果第一个不对，请尝试其他口令。</p>
                <p><strong>不支持：</strong>【银龙之翼】不支持。</p>
                <p><strong>版权声明：</strong>本项目仅为个人学习研究使用，请不要进行商业用途或营利使用。</p>
            </div>
            <button id="closePopup" class="popup-button">我知道了</button>
        </div>
    </div>
    
    <!-- 全局显示口令按钮 -->
    <button id="showPasswordOverlay" class="show-password-overlay" style="display: none;">显示口令</button>
    
    <!-- 密码验证弹窗 -->
    <div id="passwordVerifyPopup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <h3>请输入密码查看</h3>
            <div class="popup-message">
                <input type="text" id="verifyPasswordInput" maxlength="6" placeholder="请输入密码" style="width: 100%; padding: 10px; font-size: 16px; text-align: center; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <p id="verifyError" style="color: #e74c3c; margin-top: 10px; display: none;">口令错误</p>
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="cancelVerify" class="popup-button" style="background-color: #95a5a6;">取消</button>
                <button id="confirmVerify" class="popup-button">确认</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <h1>大伦车机口令工具<span id="app-version" style="font-size: 12px; color: #999;">v2.176.0</span></h1>
        <div class="link-buttons">
            <a href="https://manual.qianxian.tech/" target="_self" class="link-button">使用教程</a>
            <a href="https://tool.qianxian.tech/" target="_self" class="link-button">安装工具</a>
        </div>
        <!-- 斜放水印层 -->
        <div class="watermark-container">
            <div class="watermark-diagonal">抖音@大伦哥的CDM</div>
        </div>
        
        <div class="car-selector">
            <label for="carModel">选择车型：</label>
            <select id="carModel">
                <option value="traveler">捷途旅行者/山海T2</option>
                <option value="ziyouzhe">自由者/山海T1</option>
                <option value="shanhal7">山海L7/Plus/T9</option>
                <option value="shanhal9">山海L9</option>
                <option value="x70plus">X70Plus/L/Pro/CDM</option>
                <option value="x90plus">X90/Plus/Pro/CDM</option>
                <option value="x95">X95</option>
                <option value="dasheng">捷途大圣</option>
                <option value="fengyunA9">风云A9/T9</option>
                <option value="hu8">虎8/8L</option>
            </select>
        </div>
        
        <div class="version-switcher">
            <div class="version-buttons">
                <button class="version-button" data-version="00x">00.08及以下</button>
                <button class="version-button" data-version="0406">4.06及以下</button>
                <button class="version-button active" data-version="0407">4.07以上</button>
                <button class="version-button" data-version="other">其他</button>
            </div>
        </div>
        
        <div class="hour-password-group">
            <div class="hour-indicator">
                口令有效期：<span id="nextUpdateTime">--</span>
            </div>
            <div class="password-group" id="passwordGroup">
                <!-- 口令输入框将由JS动态生成 -->
            </div>
        </div>
        
        <div class="update-info">
            最后更新时间：<span id="updateTime">--</span>
        </div>
    </div>
    <script src="app.js" type="module"></script>
</body>
</html>
